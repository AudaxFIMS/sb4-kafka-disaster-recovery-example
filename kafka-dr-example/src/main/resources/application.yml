spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

kafka-dr:
  enabled: true
  default-environment:
    spring.cloud.stream.kafka.binder:
      auto-create-topics: false
      replication-factor: 1
      configuration:
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000
        request.timeout.ms: 5000
        default.api.timeout.ms: 10000
        socket.connection.setup.timeout.ms: 3000
        socket.connection.setup.timeout.max.ms: 5000
        schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}

  auto-create-topics: true

  default-producer-properties:
    sync: true
    configuration:
      acks: all
      max.block.ms: 5000
      delivery.timeout.ms: 10000
      request.timeout.ms: 5000
      key.serializer: org.apache.kafka.common.serialization.StringSerializer

  clusters:
    primary:
      bootstrap-servers: ${KAFKA_PRIMARY_BROKERS:localhost:9092}
      priority: 1
    secondary:
      bootstrap-servers: ${KAFKA_SECONDARY_BROKERS:localhost:9094}
      priority: 2
    tertiary:
      bootstrap-servers: ${KAFKA_TERTIARY_BROKERS:localhost:9096}
      priority: 3

  consumers:
    - topic: demo-events
      group: dr-demo-group
      handler: processDemoEvent
      content-type: string

    - topic: order-events
      group: dr-demo-group
      handler: processOrder
      content-type: json

    - topic: payment-events
      group: dr-demo-group
      handler: processPayment
      content-type: native
      properties:
        configuration:
          value.deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
          specific.avro.reader: "true"

    - topic: raw-telemetry
      group: dr-demo-group
      handler: processRawData
      content-type: bytes

  producers:
    - topic: demo-events
      content-type: string

    - topic: order-events
      content-type: json

    - topic: payment-events
      content-type: native
      properties:
        configuration:
          value.serializer: io.confluent.kafka.serializers.KafkaAvroSerializer

    - topic: raw-telemetry
      content-type: bytes

  health-check:
    interval-ms: 5000
    timeout-ms: 3000
    failure-threshold: 3
    recovery-threshold: 3
  late-initializer:
    timeout-ms: 3000
  idempotency:
    ttl-seconds: 3600
    key-prefix: idempotency

logging:
  level:
    org.apache.kafka.clients.NetworkClient: ERROR
    org.apache.kafka.clients.admin.internals.AdminMetadataManager: ERROR
    org.apache.kafka.clients.Metadata: ERROR
    org.apache.kafka.clients.FetchSessionHandler: ERROR
    org.springframework.kafka.support.LoggingProducerListener: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
