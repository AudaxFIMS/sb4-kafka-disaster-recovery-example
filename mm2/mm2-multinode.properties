# MirrorMaker 2 — one-directional replication for DR
# Active cluster -> standby cluster only.
# Reverse direction is NOT needed: when failback occurs, the app produces
# directly to the recovered cluster. Bidirectional replication with
# IdentityReplicationPolicy causes infinite loops.

clusters = primary, secondary

primary.bootstrap.servers = primary-node-1:19092,primary-node-2:19092,primary-node-3:19092
secondary.bootstrap.servers = secondary-node-1:19092,secondary-node-2:19092,secondary-node-3:19092

# Primary -> secondary only (DR standby)
primary->secondary.enabled = true
primary->secondary.topics = .*

# Reverse disabled — prevents message loops
secondary->primary.enabled = false

replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 10

emit.heartbeats.enabled = true
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 10

refresh.topics.interval.seconds = 10

replication.factor = 3
checkpoints.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
offset-syncs.topic.replication.factor = 3
offset.storage.replication.factor = 3
status.storage.replication.factor = 3
config.storage.replication.factor = 3

primary.consumer.auto.offset.reset = earliest
secondary.consumer.auto.offset.reset = earliest
