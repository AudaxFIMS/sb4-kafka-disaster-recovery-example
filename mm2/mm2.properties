# MirrorMaker 2 — one-directional replication for DR
# Active (highest priority) -> standby clusters.
# Bidirectional replication with IdentityReplicationPolicy causes infinite loops.

clusters = primary, secondary, tertiary

primary.bootstrap.servers = kafka-primary:19092
secondary.bootstrap.servers = kafka-secondary:19094
tertiary.bootstrap.servers = kafka-tertiary:19096

# Primary -> secondary and tertiary (standby clusters)
primary->secondary.enabled = true
primary->secondary.topics = .*

primary->tertiary.enabled = true
primary->tertiary.topics = .*

# Reverse directions disabled
secondary->primary.enabled = false
secondary->tertiary.enabled = false
tertiary->primary.enabled = false
tertiary->secondary.enabled = false

replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 10

emit.heartbeats.enabled = true
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 10

refresh.topics.interval.seconds = 10

replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

primary.consumer.auto.offset.reset = earliest
secondary.consumer.auto.offset.reset = earliest
tertiary.consumer.auto.offset.reset = earliest
