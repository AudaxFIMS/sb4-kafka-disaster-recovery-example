# MirrorMaker 2 Configuration
# Replicates topics between all three clusters.
# Preserves timestamps so seek-by-timestamp works on failover.

# Cluster aliases
clusters = primary, secondary, tertiary

# Bootstrap servers (internal Docker network)
primary.bootstrap.servers = kafka-primary:19092
secondary.bootstrap.servers = kafka-secondary:19094
tertiary.bootstrap.servers = kafka-tertiary:19096

# Replication flows: full mesh between all clusters
primary->secondary.enabled = true
primary->secondary.topics = events, demo-events, order-events, payment-events, raw-telemetry

primary->tertiary.enabled = true
primary->tertiary.topics = events, demo-events, order-events, payment-events, raw-telemetry

secondary->primary.enabled = true
secondary->primary.topics = events, demo-events, order-events, payment-events, raw-telemetry

secondary->tertiary.enabled = true
secondary->tertiary.topics = events, demo-events, order-events, payment-events, raw-telemetry

tertiary->primary.enabled = true
tertiary->primary.topics = events, demo-events, order-events, payment-events, raw-telemetry

tertiary->secondary.enabled = true
tertiary->secondary.topics = events, demo-events, order-events, payment-events, raw-telemetry

# Preserve original topic names (no "primary." prefix on target)
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy

# Sync consumer group offsets
sync.group.offsets.enabled = true
sync.group.offsets.interval.seconds = 10

# Emit heartbeats and checkpoints
emit.heartbeats.enabled = true
emit.checkpoints.enabled = true
emit.checkpoints.interval.seconds = 10

# Refresh topics every 10 seconds
refresh.topics.interval.seconds = 10

# Replication factor for internal topics on single-node clusters
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# Consumer configs
primary.consumer.auto.offset.reset = earliest
secondary.consumer.auto.offset.reset = earliest
tertiary.consumer.auto.offset.reset = earliest
